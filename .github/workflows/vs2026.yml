name: vs2026
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4
      - name: Display Info
        run: |
          echo $(hostname)
      - name: Enable MSVC - 让后续shell保有MSVC的环境变量。
        uses: ilammy/msvc-dev-cmd@v1
      - name: Test
        run: |
          dotnet --info
          echo $env:PATH
          Get-Command vswhere
          $componentId = "Microsoft.VisualStudio.Component.VC.Tools.x86.x64"
          $isInstalled = vswhere -latest -requires $componentId -property installationPath
          echo $isInstalled

          dotnet new console -o HelloBionic --aot
          cd HelloBionic
          dotnet publish -r win-x64 -p:DisableUnsupportedError=true -p:PublishAotUsingRuntimePack=true
          ls bin/x64/Release/net*.0/win-x64/publish/ -ErrorAction SilentlyContinue
