name: xxx
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Software - AOT 构建依赖了 libxml2-16 但 ubuntu 25 才会内置
        run: |
          find /usr/lib -name "libxml2.so*"
          sudo ln -s /usr/lib/$(dpkg-architecture -q DEB_HOST_GNU_TYPE)/libxml2.so.2 /usr/lib/$(dpkg-architecture -q DEB_HOST_GNU_TYPE)/libxml2.so.16
          echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
      - name: Display ENV
        run: |
          echo $PATH
          echo $ANDROID_NDK_HOME
          echo $ANDROID_HOME
      - name: Display clang/clang++
        run: |
          uname -m
          dotnet --version
          clang --version
          clang++ --version
          clang++ --target=aarch64-linux-android24 --version
          clang --target=aarch64-linux-android24 helloworld.c -fsyntax-only
      - name: Cache Files
        id: cache-files
        uses: actions/cache@v5.0.3
        with:
            # 缓存文件夹
            path: |
              Godot_v4.6.1-stable_mono_linux_x86_64/
            key: godot-v4.6.1-mono4
            enableCrossOsArchive: true
      - name: Download Godot
        if: steps.cache-files.outputs.cache-hit != 'true'
        run: |
          wget --quiet https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_linux_x86_64.zip
          unzip Godot_v*-stable_mono_linux_x86_64.zip
          rm Godot_v*-stable_mono_linux_x86_64.zip
          # touch 不支持*通配符
          touch Godot_v4.6.1-stable_mono_linux_x86_64/_sc_
          ./Godot_v*-stable_mono_linux_x86_64/Godot_v*-stable_mono_linux.x86_64 --version

          wget --quiet https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_export_templates.tpz
          unzip Godot_v*-stable_mono_export_templates.tpz -d tmp-tpz
          rm Godot_v*-stable_mono_export_templates.tpz
          #export TDIR=$HOME/.local/share/godot/export_templates/4.6.1.stable.mono/
          export TDIR=Godot_v4.6.1-stable_mono_linux_x86_64/editor_data/export_templates/4.6.1.stable.mono/
          mkdir -p $TDIR
          mv tmp-tpz/templates/* $TDIR
          ls -la $TDIR
          echo $TDIR
          ls -la Godot_v*-stable_mono_linux_x86_64/
      - name: x
        run: |
          ./Godot_v4.6.1-stable_mono_linux_x86_64/Godot_v4.6.1-stable_mono_linux.x86_64 --headless --script without_project.gd
          cd other/godot/aot/android-aot-example/
          dotnet new sln --format "sln"
          dotnet sln add android-aot-example.csproj
          ls
          cat android-aot-example.sln
          cd -
          mkdir export-dir
          ./Godot_v4.6.1-stable_mono_linux_x86_64/Godot_v4.6.1-stable_mono_linux.x86_64 --headless --export-release Linux export-dir/game.linux --quit -v --path other/godot/aot/android-aot-example/
          ls export-dir/
